<!doctype html>
<html lang="ko" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      th:replace="~{base-layout::layout(~{::section})}">
<body>
<section class="container">
    <table class="table">
        <thead>
        <tr>
            <td>번호</td>
            <td>제목</td>
            <td style="width: 20%;">작성자</td>
            <td style="width: 20%;">수정날짜</td>
        </tr>
        </thead>
        <tbody>
        <tr th:each="article : ${page.content}">
            <td th:text="${article.id}">id</td>
            <td><a th:text="${article.title}" th:href="@{/article/content(id=${article.id}, pageNumber=${page.number})}">title</a></td>
            <td th:text="${article.name}">author</td>
            <td th:text="${#temporals.format(article.updated,'yyyy-MM-dd HH:mm:ss')}">2025-06-30 09:03:19</td>
        </tr>
        </tbody>
    </table>
    <div th:replace="~{common::pager(${page},
                ${#strings.isEmpty(keyword) ? '/article/list' : '/article/search'}, 5)}"></div>
    <div>
        <form th:action="@{/article/search}" method="get">
            <select name="searchType">
                <option value="title" selected th:selected="${searchType == 'title'}">제목</option>
                <option value="description" th:selected="${searchType == 'description'}">내용</option>
                <option value="memberName" th:selected="${searchType == 'memberName'}">글쓴이</option>
            </select>
            <input type="text" name="keyword" th:value="${keyword}" placeholder="검색어를 입력해주세요"/>
            <button type="submit" class="btn btn-primary">검색</button>
        </form>
    </div>
    <a type="button" class="btn btn-primary" th:href="@{/article/add}" sec:authorize="isAuthenticated()">글쓰기</a>
</section>
</body>
</html>
