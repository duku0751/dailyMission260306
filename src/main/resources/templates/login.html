<!doctype html>
<html lang="ko" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="https://www.thymeleaf.org" th:replace="~{base-layout::layout(~{::section})}">
<body>
<section class="container">
    <h1>로그인</h1>
    <div class="mb-3 text-danger" th:if="${param.error}">아이디와 패스워드가 잘못 되었습니다</div>
    <form action="article-list-without-pagination.html" th:action="@{/login}" method="post">
        <div class="col-3 mb-3">
            <input type="text" class="form-control" id="username" name="username" placeholder="이메일">
        </div>
        <div class="col-3 mb-3">
            <input type="password" class="form-control" id="password" name="password" placeholder="패스워드">
        </div>
        <button type="submit" class="btn btn-primary">로그인</button>
    </form>
</section>
</body>
</html>
